services:
  db:
    image: mysql:8.0
    container_name: gym_manager_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gym_management
    ports:
      - "3306:3306"
    volumes:
      - gym_db_data:/var/lib/mysql
      # Initialize database with schema and sample data on first run
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql

  web:
    build: .
    container_name: gym_manager_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=gym_management
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  gym_db_data:
